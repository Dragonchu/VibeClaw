[workspace]
resolver = "3"
members = [
    "crates/ipc",
    "crates/boot",
    "crates/services/compiler",
    "crates/services/judge",
    "crates/services/audit",
    "crates/peripheral",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
loopy-ipc = { path = "crates/ipc" }
