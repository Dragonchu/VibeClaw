<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reloopy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #0d0d0d;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
        flex-shrink: 0;
      }

      #header .brand {
        font-size: 16px;
        font-weight: 600;
        color: #0d0d0d;
      }

      #new-chat-btn {
        background: none;
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        color: #0d0d0d;
        cursor: pointer;
        transition: background 0.15s;
      }

      #new-chat-btn:hover {
        background: #f5f5f5;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 0 16px;
        position: relative;
        scroll-behavior: smooth;
      }

      .msg-container {
        max-width: 768px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .msg {
        margin-bottom: 28px;
        line-height: 1.7;
        font-size: 15px;
      }

      .msg .role {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #0d0d0d;
      }

      .msg.user .role {
        color: #0d0d0d;
      }

      .msg.assistant .role {
        color: #0d0d0d;
      }

      .msg.user {
        padding: 0;
      }

      .msg.user .content {
        background: #f7f7f8;
        border-radius: 18px;
        padding: 12px 18px;
        display: inline-block;
        max-width: 100%;
      }

      .msg.assistant {
        padding: 0;
      }

      .msg .content {
        white-space: pre-wrap;
        word-break: break-word;
        color: #0d0d0d;
      }

      /* Reasoning block - subtle thinking indicator */
      .reasoning-block {
        background: #f9f9fa;
        border-left: 3px solid #c8c8cc;
        padding: 0;
        margin: 10px 0;
        border-radius: 0 8px 8px 0;
        font-size: 13px;
        color: #666;
        overflow: hidden;
      }

      .reasoning-block summary {
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.3px;
        color: #888;
        padding: 8px 12px;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 6px;
        list-style: none;
        transition: color 0.15s, background 0.15s;
      }

      .reasoning-block summary::-webkit-details-marker {
        display: none;
      }

      .reasoning-block summary:hover {
        color: #555;
        background: #f0f0f2;
      }

      .reasoning-block summary .chevron {
        font-size: 10px;
        transition: transform 0.2s;
        flex-shrink: 0;
      }

      .reasoning-block[open] summary .chevron {
        transform: rotate(90deg);
      }

      .reasoning-block summary .thinking-icon {
        font-size: 13px;
        flex-shrink: 0;
      }

      .reasoning-block .reasoning-content {
        padding: 0 12px 10px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
        max-height: 400px;
        overflow-y: auto;
      }

      .reasoning-block.active summary {
        color: #666;
      }

      .reasoning-block.active summary .thinking-icon {
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* Tool block - inline card style */
      .tool-block {
        background: #ffffff;
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        margin: 10px 0;
        font-size: 13px;
        color: #333;
        transition: border-color 0.15s;
      }

      .tool-block:hover {
        border-color: #d0d0d0;
      }

      .tool-block summary {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        font-size: 13px;
        user-select: none;
        list-style: none;
        transition: background 0.15s;
        border-radius: 10px;
      }

      .tool-block summary:hover {
        background: #fafafa;
      }

      .tool-block summary::-webkit-details-marker {
        display: none;
      }

      .tool-block summary .chevron {
        font-size: 10px;
        color: #999;
        transition: transform 0.2s;
        flex-shrink: 0;
      }

      .tool-block[open] summary .chevron {
        transform: rotate(90deg);
      }

      .tool-block[open] summary {
        border-radius: 10px 10px 0 0;
      }

      .tool-block .tool-icon {
        font-size: 14px;
        flex-shrink: 0;
      }

      .tool-block .tool-name {
        color: #0d0d0d;
        font-weight: 600;
        font-size: 12px;
      }

      .tool-block .tool-status {
        margin-left: auto;
        font-size: 12px;
        color: #999;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .tool-block .tool-status .status-done {
        color: #16a34a;
      }

      .tool-block .tool-status .spinner {
        margin-right: 0;
      }

      .tool-block .tool-content {
        padding: 0 14px 12px;
        border-top: 1px solid #e5e5e5;
      }

      .tool-block .tool-output {
        color: #555;
        margin-top: 8px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        max-height: 300px;
        overflow-y: auto;
        background: #f9f9fa;
        padding: 10px 12px;
        border-radius: 6px;
        line-height: 1.5;
      }

      .tool-block.running {
        border-color: #d0d0ff;
        background: #fafaff;
      }

      .error-block {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 10px 14px;
        margin: 8px 0;
        color: #dc2626;
        font-size: 13px;
      }

      #input-area {
        padding: 12px 24px 24px;
        background: #ffffff;
        flex-shrink: 0;
      }

      #input-form {
        max-width: 768px;
        margin: 0 auto;
        display: flex;
        align-items: flex-end;
        gap: 0;
        background: #f7f7f8;
        border: 1px solid #e5e5e5;
        border-radius: 24px;
        padding: 4px 4px 4px 18px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      #input-form:focus-within {
        border-color: #c0c0c0;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
      }

      #input-form textarea {
        flex: 1;
        background: transparent;
        color: #0d0d0d;
        border: none;
        padding: 10px 0;
        font-family: inherit;
        font-size: 15px;
        resize: none;
        outline: none;
        min-height: 24px;
        max-height: 200px;
        line-height: 1.5;
      }

      #input-form textarea::placeholder {
        color: #999;
      }

      #send-btn {
        background: #0d0d0d;
        border: none;
        border-radius: 20px;
        color: white;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }

      #send-btn:hover {
        background: #333;
      }

      #send-btn:disabled {
        background: #d9d9d9;
        cursor: not-allowed;
      }

      #send-btn svg {
        width: 18px;
        height: 18px;
      }

      .spinner {
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid #e5e5e5;
        border-top-color: #0d0d0d;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        color: #999;
        text-align: center;
      }

      #welcome h2 {
        font-size: 22px;
        font-weight: 600;
        color: #0d0d0d;
        margin-bottom: 8px;
      }

      #welcome p {
        font-size: 14px;
        color: #888;
      }

      /* Scroll-to-bottom floating button */
      #scroll-bottom-btn {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: #0d0d0d;
        color: #ffffff;
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        display: none;
        align-items: center;
        gap: 6px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        z-index: 100;
        transition: opacity 0.2s, transform 0.2s;
      }

      #scroll-bottom-btn:hover {
        background: #333;
      }

      #scroll-bottom-btn svg {
        width: 14px;
        height: 14px;
      }

      #scroll-bottom-btn.visible {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <span class="brand">Reloopy</span>
      <button id="new-chat-btn">New Chat</button>
    </div>

    <div id="messages">
      <div class="msg-container" id="msg-container">
        <div id="welcome">
          <h2>What can I help with?</h2>
          <p>Ask me anything or request changes to my source code.</p>
        </div>
      </div>
    </div>

    <button id="scroll-bottom-btn" aria-label="Scroll to bottom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
      New messages
    </button>

    <div id="input-area">
      <form id="input-form">
        <textarea
          id="input"
          rows="1"
          placeholder="Message Reloopy..."
          autofocus
        ></textarea>
        <button type="submit" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </form>
    </div>

    <script>
      const STORAGE_KEY = 'reloopy-chat-history';

      const msgContainer = document.getElementById('msg-container');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send-btn');
      const form = document.getElementById('input-form');
      const messagesDiv = document.getElementById('messages');
      const welcomeEl = document.getElementById('welcome');
      const newChatBtn = document.getElementById('new-chat-btn');
      const scrollBottomBtn = document.getElementById('scroll-bottom-btn');

      let streaming = false;
      let currentAssistantEl = null;
      let currentContentEl = null;
      let currentReasoningEl = null;
      let currentToolEl = null;
      let hasContent = false;
      let userScrolledUp = false;

      messagesDiv.addEventListener('scroll', () => {
        const threshold = 80;
        userScrolledUp = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight > threshold;
        updateScrollButton();
      });

      scrollBottomBtn.addEventListener('click', () => {
        scrollToBottom(true);
        userScrolledUp = false;
        updateScrollButton();
      });

      function updateScrollButton() {
        if (userScrolledUp && streaming) {
          scrollBottomBtn.classList.add('visible');
        } else {
          scrollBottomBtn.classList.remove('visible');
        }
      }

      // --- localStorage persistence ---
      function loadHistory() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          console.warn('Failed to load chat history:', e);
          return [];
        }
      }

      function saveHistory(history) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        } catch (e) {
          console.warn('Failed to save chat history:', e);
        }
      }

      function appendToHistory(entry) {
        const history = loadHistory();
        history.push(entry);
        saveHistory(history);
      }

      function clearHistory() {
        localStorage.removeItem(STORAGE_KEY);
      }

      function restoreMessages() {
        const history = loadHistory();
        if (history.length === 0) return;
        hideWelcome();
        for (const entry of history) {
          if (entry.role === 'user') {
            renderUserMessage(entry.text);
          } else if (entry.role === 'assistant') {
            renderAssistantMessage(entry);
          }
        }
        scrollToBottom(true);
      }

      function renderUserMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="role">You</div><div class="content">${escapeHtml(text)}</div>`;
        msgContainer.appendChild(el);
      }

      function renderAssistantMessage(entry) {
        const el = document.createElement('div');
        el.className = 'msg assistant';
        el.innerHTML = '<div class="role">Reloopy</div>';

        if (entry.blocks) {
          // New ordered-blocks format — renders in chronological order
          for (const block of entry.blocks) {
            switch (block.type) {
              case 'reasoning': {
                const details = document.createElement('details');
                details.className = 'reasoning-block';
                details.innerHTML = `<summary><span class="chevron">▶</span><span class="thinking-icon">💭</span> Thinking</summary><div class="reasoning-content">${escapeHtml(block.text)}</div>`;
                el.appendChild(details);
                break;
              }
              case 'content': {
                const contentEl = document.createElement('div');
                contentEl.className = 'content';
                contentEl.textContent = block.text;
                el.appendChild(contentEl);
                break;
              }
              case 'tool': {
                const details = document.createElement('details');
                details.className = 'tool-block';
                details.innerHTML =
                  `<summary><span class="chevron">▶</span><span class="tool-icon">⚡</span> <span class="tool-name">${escapeHtml(block.name)}</span> <span class="tool-status"><span class="status-done">✓</span></span></summary>` +
                  (block.output ? `<div class="tool-content"><div class="tool-output">${escapeHtml(block.output)}</div></div>` : '');
                el.appendChild(details);
                break;
              }
            }
          }
        } else {
          // Legacy format: reasoning → tools → content
          if (entry.reasoning) {
            const details = document.createElement('details');
            details.className = 'reasoning-block';
            details.innerHTML = `<summary><span class="chevron">▶</span><span class="thinking-icon">💭</span> Thinking</summary><div class="reasoning-content">${escapeHtml(entry.reasoning)}</div>`;
            el.appendChild(details);
          }

          if (entry.tools && entry.tools.length > 0) {
            for (const tool of entry.tools) {
              const details = document.createElement('details');
              details.className = 'tool-block';
              details.innerHTML =
                `<summary><span class="chevron">▶</span><span class="tool-icon">⚡</span> <span class="tool-name">${escapeHtml(tool.name)}</span> <span class="tool-status"><span class="status-done">✓</span></span></summary>` +
                (tool.output ? `<div class="tool-content"><div class="tool-output">${escapeHtml(tool.output)}</div></div>` : '');
              el.appendChild(details);
            }
          }

          if (entry.content) {
            const contentEl = document.createElement('div');
            contentEl.className = 'content';
            contentEl.textContent = entry.content;
            el.appendChild(contentEl);
          }
        }

        if (entry.errors && entry.errors.length > 0) {
          for (const err of entry.errors) {
            const errEl = document.createElement('div');
            errEl.className = 'error-block';
            errEl.textContent = err;
            el.appendChild(errEl);
          }
        }

        msgContainer.appendChild(el);
      }

      // Current assistant message accumulator for saving
      let pendingAssistant = null;

      function resetPendingAssistant() {
        pendingAssistant = { role: 'assistant', blocks: [], errors: [] };
      }

      function appendToBlock(type, data) {
        if (!pendingAssistant) return;
        const blocks = pendingAssistant.blocks;
        // Tool blocks are always separate entries
        if (type === 'tool') {
          blocks.push({ type: 'tool', name: data.name, output: data.output });
          return;
        }
        // Merge consecutive text blocks of the same type (reasoning, content)
        const last = blocks[blocks.length - 1];
        if (last && last.type === type) {
          last.text += data;
        } else {
          blocks.push({ type, text: data });
        }
      }

      function savePendingAssistant() {
        if (pendingAssistant && (pendingAssistant.blocks.length > 0 || pendingAssistant.errors.length > 0)) {
          appendToHistory(pendingAssistant);
        }
        pendingAssistant = null;
      }

      // --- UI helpers ---
      function hideWelcome() {
        if (welcomeEl) welcomeEl.style.display = 'none';
      }

      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || streaming) return;

        hideWelcome();
        appendUserMessage(text);
        appendToHistory({ role: 'user', text: text });
        input.value = '';
        input.style.height = 'auto';
        startStreaming(text);
      });

      newChatBtn.addEventListener('click', async () => {
        clearHistory();
        msgContainer.innerHTML = '';
        if (welcomeEl) {
          msgContainer.appendChild(welcomeEl);
          welcomeEl.style.display = '';
        }
        try {
          await fetch('/api/reset', { method: 'POST' });
        } catch (e) {
          console.warn('Failed to reset backend conversation:', e);
        }
      });

      function appendUserMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="role">You</div><div class="content">${escapeHtml(text)}</div>`;
        msgContainer.appendChild(el);
        scrollToBottom(true);
      }

      function startAssistantMessage() {
        currentAssistantEl = document.createElement('div');
        currentAssistantEl.className = 'msg assistant';
        currentAssistantEl.innerHTML =
          '<div class="role"><span class="spinner"></span>Reloopy</div>';
        currentContentEl = null;
        currentReasoningEl = null;
        currentToolEl = null;
        hasContent = false;
        resetPendingAssistant();
        msgContainer.appendChild(currentAssistantEl);
        scrollToBottom(true);
      }

      function ensureContentEl() {
        if (!currentContentEl) {
          currentContentEl = document.createElement('div');
          currentContentEl.className = 'content';
          currentAssistantEl.appendChild(currentContentEl);
        }
        return currentContentEl;
      }

      function ensureReasoningEl() {
        if (!currentReasoningEl) {
          currentReasoningEl = document.createElement('details');
          currentReasoningEl.className = 'reasoning-block active';
          currentReasoningEl.open = true;
          currentReasoningEl.innerHTML =
            '<summary><span class="chevron">▶</span><span class="thinking-icon">💭</span> Thinking</summary><div class="reasoning-content"></div>';
          currentAssistantEl.appendChild(currentReasoningEl);
        }
        return currentReasoningEl.querySelector('.reasoning-content');
      }

      async function startStreaming(text) {
        streaming = true;
        sendBtn.disabled = true;
        updateScrollButton();
        startAssistantMessage();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: text,
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (!data) continue;
                try {
                  const event = JSON.parse(data);
                  handleEvent(event);
                } catch {}
              }
            }
          }
        } catch (err) {
          const el = document.createElement('div');
          el.className = 'error-block';
          el.textContent = 'Connection error: ' + err.message;
          if (currentAssistantEl) currentAssistantEl.appendChild(el);
          else msgContainer.appendChild(el);
          if (pendingAssistant) pendingAssistant.errors.push('Connection error: ' + err.message);
        }

        finishStreaming();
      }

      function handleEvent(event) {
        switch (event.type) {
          case 'Reasoning':
            ensureReasoningEl().textContent += event.data;
            appendToBlock('reasoning', event.data);
            break;

          case 'Content':
            // Close and deactivate current reasoning block when content starts
            if (currentReasoningEl) {
              if (currentReasoningEl.open) {
                currentReasoningEl.open = false;
              }
              currentReasoningEl.classList.remove('active');
            }
            ensureContentEl().textContent += event.data;
            hasContent = true;
            appendToBlock('content', event.data);
            break;

          case 'ToolCallStart': {
            // Close and deactivate current reasoning block
            if (currentReasoningEl) {
              currentReasoningEl.classList.remove('active');
              if (currentReasoningEl.open) {
                currentReasoningEl.open = false;
              }
            }
            // Reset so subsequent content/reasoning appears after this tool block
            currentContentEl = null;
            currentReasoningEl = null;
            const details = document.createElement('details');
            details.className = 'tool-block running';
            details.innerHTML =
              `<summary><span class="chevron">▶</span><span class="tool-icon">⚡</span> <span class="tool-name">${escapeHtml(event.data.name)}</span> <span class="tool-status"><span class="spinner"></span></span></summary>` +
              `<div class="tool-content"></div>`;
            currentAssistantEl.appendChild(details);
            currentToolEl = details;
            break;
          }

          case 'ToolCallArgDelta':
            if (currentToolEl) {
              const contentEl = currentToolEl.querySelector('.tool-content');
              if (contentEl) {
                if (!contentEl.querySelector('.tool-args')) {
                  const argsEl = document.createElement('div');
                  argsEl.className = 'tool-output tool-args';
                  contentEl.appendChild(argsEl);
                }
                contentEl.querySelector('.tool-args').textContent += event.data;
              }
            }
            break;

          case 'ToolResult': {
            // Reset so subsequent content/reasoning appears after this tool block
            currentContentEl = null;
            currentReasoningEl = null;
            if (currentToolEl) {
              // Update existing tool block from ToolCallStart
              currentToolEl.classList.remove('running');
              const statusEl = currentToolEl.querySelector('.tool-status');
              if (statusEl) statusEl.innerHTML = '<span class="status-done">✓</span>';
              const contentEl = currentToolEl.querySelector('.tool-content');
              if (contentEl) {
                contentEl.innerHTML = '';
                const outputEl = document.createElement('div');
                outputEl.className = 'tool-output';
                outputEl.textContent = event.data.output;
                contentEl.appendChild(outputEl);
              }
              currentToolEl = null;
            } else {
              // Standalone ToolResult without preceding ToolCallStart
              const details = document.createElement('details');
              details.className = 'tool-block';
              details.innerHTML =
                `<summary><span class="chevron">▶</span><span class="tool-icon">⚡</span> <span class="tool-name">${escapeHtml(event.data.name)}</span> <span class="tool-status"><span class="status-done">✓</span></span></summary>` +
                `<div class="tool-content"><div class="tool-output">${escapeHtml(event.data.output)}</div></div>`;
              currentAssistantEl.appendChild(details);
            }
            appendToBlock('tool', { name: event.data.name, output: event.data.output });
            break;
          }

          case 'SubmitUpdate': {
            if (currentReasoningEl) {
              currentReasoningEl.classList.remove('active');
            }
            currentContentEl = null;
            currentReasoningEl = null;
            const details = document.createElement('details');
            details.className = 'tool-block running';
            details.innerHTML =
              `<summary><span class="chevron">▶</span><span class="tool-icon">🚀</span> <span class="tool-name">submit_update</span> <span class="tool-status"><span class="spinner"></span></span></summary>` +
              `<div class="tool-content"><div class="tool-output">Submitting changes for compilation...</div></div>`;
            currentAssistantEl.appendChild(details);
            appendToBlock('tool', { name: 'submit_update', output: 'Submitting changes for compilation...' });
            break;
          }

          case 'Error': {
            const el = document.createElement('div');
            el.className = 'error-block';
            el.textContent = event.data;
            currentAssistantEl.appendChild(el);
            if (pendingAssistant) pendingAssistant.errors.push(event.data);
            break;
          }

          case 'Done':
            break;
        }
        scrollToBottom();
      }

      function finishStreaming() {
        streaming = false;
        sendBtn.disabled = false;
        if (currentAssistantEl) {
          // Remove the spinner from the role label
          const spinner = currentAssistantEl.querySelector('.role > .spinner');
          if (spinner) spinner.remove();
          // Deactivate any remaining active reasoning block
          const activeReasoning = currentAssistantEl.querySelector('.reasoning-block.active');
          if (activeReasoning) activeReasoning.classList.remove('active');
          // Remove running state from any tool blocks
          const runningTools = currentAssistantEl.querySelectorAll('.tool-block.running');
          runningTools.forEach(el => el.classList.remove('running'));
        }
        savePendingAssistant();
        currentAssistantEl = null;
        currentContentEl = null;
        currentReasoningEl = null;
        currentToolEl = null;
        updateScrollButton();
        input.focus();
      }

      function scrollToBottom(force) {
        if (force || !userScrolledUp) {
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      }

      function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
      }

      // Restore conversation on load
      restoreMessages();
      input.focus();
    </script>
  </body>
</html>
