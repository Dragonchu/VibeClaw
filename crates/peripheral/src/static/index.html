<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loopy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 0;
      }

      .msg-container {
        max-width: 768px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .msg {
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .msg.user {
        background: #16213e;
        border-radius: 12px;
        padding: 12px 16px;
      }

      .msg.assistant {
        padding: 4px 0;
      }

      .msg .role {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #888;
        margin-bottom: 6px;
      }

      .msg .content {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .reasoning-block {
        background: #0f3460;
        border-left: 3px solid #e94560;
        padding: 8px 12px;
        margin: 8px 0;
        border-radius: 0 8px 8px 0;
        font-size: 13px;
        color: #a0b0c0;
      }

      .reasoning-block summary {
        cursor: pointer;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #e94560;
        margin-bottom: 4px;
      }

      .tool-block {
        background: #1a1a3e;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 8px 12px;
        margin: 8px 0;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 13px;
      }

      .tool-block .tool-name {
        color: #e94560;
        font-weight: 600;
      }

      .tool-block .tool-output {
        color: #7ec8e3;
        margin-top: 4px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .error-block {
        background: #3e0000;
        border: 1px solid #e94560;
        border-radius: 8px;
        padding: 8px 12px;
        margin: 8px 0;
        color: #ff6b6b;
      }

      #input-area {
        border-top: 1px solid #333;
        padding: 16px;
        background: #16213e;
      }

      #input-form {
        max-width: 768px;
        margin: 0 auto;
        display: flex;
        gap: 8px;
      }

      #input-form textarea {
        flex: 1;
        background: #1a1a2e;
        color: #e0e0e0;
        border: 1px solid #444;
        border-radius: 12px;
        padding: 12px 16px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        outline: none;
        min-height: 48px;
        max-height: 200px;
      }

      #input-form textarea:focus {
        border-color: #e94560;
      }

      #input-form button {
        background: #e94560;
        border: none;
        border-radius: 12px;
        color: white;
        padding: 0 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }

      #input-form button:hover {
        background: #c73e54;
      }
      #input-form button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid #555;
        border-top-color: #e94560;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="messages">
      <div class="msg-container" id="msg-container"></div>
    </div>

    <div id="input-area">
      <form id="input-form">
        <textarea
          id="input"
          rows="1"
          placeholder="Send a message..."
          autofocus
        ></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>

    <script>
      const msgContainer = document.getElementById('msg-container');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send-btn');
      const form = document.getElementById('input-form');
      const messagesDiv = document.getElementById('messages');

      let streaming = false;
      let currentAssistantEl = null;
      let currentContentEl = null;
      let currentReasoningEl = null;
      let currentToolEl = null;
      let hasContent = false;

      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || streaming) return;

        appendUserMessage(text);
        input.value = '';
        input.style.height = 'auto';
        startStreaming(text);
      });

      function appendUserMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="role">You</div><div class="content">${escapeHtml(text)}</div>`;
        msgContainer.appendChild(el);
        scrollToBottom();
      }

      function startAssistantMessage() {
        currentAssistantEl = document.createElement('div');
        currentAssistantEl.className = 'msg assistant';
        currentAssistantEl.innerHTML =
          '<div class="role"><span class="spinner"></span>Loopy</div>';
        currentContentEl = null;
        currentReasoningEl = null;
        currentToolEl = null;
        hasContent = false;
        msgContainer.appendChild(currentAssistantEl);
        scrollToBottom();
      }

      function ensureContentEl() {
        if (!currentContentEl) {
          currentContentEl = document.createElement('div');
          currentContentEl.className = 'content';
          currentAssistantEl.appendChild(currentContentEl);
        }
        return currentContentEl;
      }

      function ensureReasoningEl() {
        if (!currentReasoningEl) {
          currentReasoningEl = document.createElement('details');
          currentReasoningEl.className = 'reasoning-block';
          currentReasoningEl.open = true;
          currentReasoningEl.innerHTML =
            '<summary>Reasoning</summary><div class="content"></div>';
          currentAssistantEl.appendChild(currentReasoningEl);
        }
        return currentReasoningEl.querySelector('.content');
      }

      async function startStreaming(text) {
        streaming = true;
        sendBtn.disabled = true;
        startAssistantMessage();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: text,
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (!data) continue;
                try {
                  const event = JSON.parse(data);
                  handleEvent(event);
                } catch {}
              }
            }
          }
        } catch (err) {
          const el = document.createElement('div');
          el.className = 'error-block';
          el.textContent = 'Connection error: ' + err.message;
          if (currentAssistantEl) currentAssistantEl.appendChild(el);
          else msgContainer.appendChild(el);
        }

        finishStreaming();
      }

      function handleEvent(event) {
        switch (event.type) {
          case 'Reasoning':
            ensureReasoningEl().textContent += event.data;
            break;

          case 'Content':
            if (currentReasoningEl && currentReasoningEl.open) {
              currentReasoningEl.open = false;
            }
            ensureContentEl().textContent += event.data;
            hasContent = true;
            break;

          case 'ToolCallStart': {
            currentToolEl = document.createElement('div');
            currentToolEl.className = 'tool-block';
            currentToolEl.innerHTML = `<span class="tool-name">${escapeHtml(event.data.name)}</span>`;
            currentAssistantEl.appendChild(currentToolEl);
            break;
          }

          case 'ToolCallArgDelta':
            break;

          case 'ToolResult': {
            const el = document.createElement('div');
            el.className = 'tool-block';
            el.innerHTML = `<span class="tool-name">${escapeHtml(event.data.name)}</span><div class="tool-output">${escapeHtml(event.data.output)}</div>`;
            currentAssistantEl.appendChild(el);
            currentToolEl = null;
            break;
          }

          case 'SubmitUpdate': {
            const el = document.createElement('div');
            el.className = 'tool-block';
            el.innerHTML =
              '<span class="tool-name">submit_update</span><div class="tool-output">Submitting changes for compilation...</div>';
            currentAssistantEl.appendChild(el);
            break;
          }

          case 'Error': {
            const el = document.createElement('div');
            el.className = 'error-block';
            el.textContent = event.data;
            currentAssistantEl.appendChild(el);
            break;
          }

          case 'Done':
            break;
        }
        scrollToBottom();
      }

      function finishStreaming() {
        streaming = false;
        sendBtn.disabled = false;
        if (currentAssistantEl) {
          const spinner = currentAssistantEl.querySelector('.spinner');
          if (spinner) spinner.remove();
        }
        currentAssistantEl = null;
        currentContentEl = null;
        currentReasoningEl = null;
        currentToolEl = null;
        input.focus();
      }

      function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
      }
    </script>
  </body>
</html>
