<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loopy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #0d0d0d;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
        flex-shrink: 0;
      }

      #header .brand {
        font-size: 16px;
        font-weight: 600;
        color: #0d0d0d;
      }

      #new-chat-btn {
        background: none;
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        color: #0d0d0d;
        cursor: pointer;
        transition: background 0.15s;
      }

      #new-chat-btn:hover {
        background: #f5f5f5;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 0 16px;
      }

      .msg-container {
        max-width: 768px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .msg {
        margin-bottom: 28px;
        line-height: 1.7;
        font-size: 15px;
      }

      .msg .role {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #0d0d0d;
      }

      .msg.user .role {
        color: #0d0d0d;
      }

      .msg.assistant .role {
        color: #0d0d0d;
      }

      .msg.user {
        padding: 0;
      }

      .msg.user .content {
        background: #f7f7f8;
        border-radius: 18px;
        padding: 12px 18px;
        display: inline-block;
        max-width: 100%;
      }

      .msg.assistant {
        padding: 0;
      }

      .msg .content {
        white-space: pre-wrap;
        word-break: break-word;
        color: #0d0d0d;
      }

      .reasoning-block {
        background: #f9f9fa;
        border-left: 3px solid #d0d0d0;
        padding: 8px 12px;
        margin: 8px 0;
        border-radius: 0 8px 8px 0;
        font-size: 13px;
        color: #666;
      }

      .reasoning-block summary {
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.3px;
        color: #999;
        margin-bottom: 4px;
        user-select: none;
      }

      .reasoning-block summary:hover {
        color: #666;
      }

      .tool-block {
        background: #f7f7f8;
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        padding: 10px 14px;
        margin: 8px 0;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 13px;
        color: #333;
      }

      .tool-block .tool-name {
        color: #0d0d0d;
        font-weight: 600;
        font-size: 12px;
      }

      .tool-block .tool-output {
        color: #555;
        margin-top: 6px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }

      .error-block {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 10px 14px;
        margin: 8px 0;
        color: #dc2626;
        font-size: 13px;
      }

      #input-area {
        padding: 12px 24px 24px;
        background: #ffffff;
        flex-shrink: 0;
      }

      #input-form {
        max-width: 768px;
        margin: 0 auto;
        display: flex;
        align-items: flex-end;
        gap: 0;
        background: #f7f7f8;
        border: 1px solid #e5e5e5;
        border-radius: 24px;
        padding: 4px 4px 4px 18px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      #input-form:focus-within {
        border-color: #c0c0c0;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
      }

      #input-form textarea {
        flex: 1;
        background: transparent;
        color: #0d0d0d;
        border: none;
        padding: 10px 0;
        font-family: inherit;
        font-size: 15px;
        resize: none;
        outline: none;
        min-height: 24px;
        max-height: 200px;
        line-height: 1.5;
      }

      #input-form textarea::placeholder {
        color: #999;
      }

      #send-btn {
        background: #0d0d0d;
        border: none;
        border-radius: 20px;
        color: white;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }

      #send-btn:hover {
        background: #333;
      }

      #send-btn:disabled {
        background: #d9d9d9;
        cursor: not-allowed;
      }

      #send-btn svg {
        width: 18px;
        height: 18px;
      }

      .spinner {
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid #e5e5e5;
        border-top-color: #0d0d0d;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        color: #999;
        text-align: center;
      }

      #welcome h2 {
        font-size: 22px;
        font-weight: 600;
        color: #0d0d0d;
        margin-bottom: 8px;
      }

      #welcome p {
        font-size: 14px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <span class="brand">Loopy</span>
      <button id="new-chat-btn">New Chat</button>
    </div>

    <div id="messages">
      <div class="msg-container" id="msg-container">
        <div id="welcome">
          <h2>What can I help with?</h2>
          <p>Ask me anything or request changes to my source code.</p>
        </div>
      </div>
    </div>

    <div id="input-area">
      <form id="input-form">
        <textarea
          id="input"
          rows="1"
          placeholder="Message Loopy..."
          autofocus
        ></textarea>
        <button type="submit" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </form>
    </div>

    <script>
      const STORAGE_KEY = 'loopy-chat-history';

      const msgContainer = document.getElementById('msg-container');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send-btn');
      const form = document.getElementById('input-form');
      const messagesDiv = document.getElementById('messages');
      const welcomeEl = document.getElementById('welcome');
      const newChatBtn = document.getElementById('new-chat-btn');

      let streaming = false;
      let currentAssistantEl = null;
      let currentContentEl = null;
      let currentReasoningEl = null;
      let currentToolEl = null;
      let hasContent = false;

      // --- localStorage persistence ---
      function loadHistory() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function saveHistory(history) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        } catch {}
      }

      function appendToHistory(entry) {
        const history = loadHistory();
        history.push(entry);
        saveHistory(history);
      }

      function clearHistory() {
        localStorage.removeItem(STORAGE_KEY);
      }

      function restoreMessages() {
        const history = loadHistory();
        if (history.length === 0) return;
        hideWelcome();
        for (const entry of history) {
          if (entry.role === 'user') {
            renderUserMessage(entry.text);
          } else if (entry.role === 'assistant') {
            renderAssistantMessage(entry);
          }
        }
        scrollToBottom();
      }

      function renderUserMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="role">You</div><div class="content">${escapeHtml(text)}</div>`;
        msgContainer.appendChild(el);
      }

      function renderAssistantMessage(entry) {
        const el = document.createElement('div');
        el.className = 'msg assistant';
        el.innerHTML = '<div class="role">Loopy</div>';

        if (entry.reasoning) {
          const details = document.createElement('details');
          details.className = 'reasoning-block';
          details.innerHTML = `<summary>Reasoning</summary><div class="content">${escapeHtml(entry.reasoning)}</div>`;
          el.appendChild(details);
        }

        if (entry.tools && entry.tools.length > 0) {
          for (const tool of entry.tools) {
            const toolEl = document.createElement('div');
            toolEl.className = 'tool-block';
            toolEl.innerHTML = `<span class="tool-name">${escapeHtml(tool.name)}</span>` +
              (tool.output ? `<div class="tool-output">${escapeHtml(tool.output)}</div>` : '');
            el.appendChild(toolEl);
          }
        }

        if (entry.content) {
          const contentEl = document.createElement('div');
          contentEl.className = 'content';
          contentEl.textContent = entry.content;
          el.appendChild(contentEl);
        }

        if (entry.errors && entry.errors.length > 0) {
          for (const err of entry.errors) {
            const errEl = document.createElement('div');
            errEl.className = 'error-block';
            errEl.textContent = err;
            el.appendChild(errEl);
          }
        }

        msgContainer.appendChild(el);
      }

      // Current assistant message accumulator for saving
      let pendingAssistant = null;

      function resetPendingAssistant() {
        pendingAssistant = { role: 'assistant', content: '', reasoning: '', tools: [], errors: [] };
      }

      function savePendingAssistant() {
        if (pendingAssistant && (pendingAssistant.content || pendingAssistant.reasoning || pendingAssistant.tools.length > 0 || pendingAssistant.errors.length > 0)) {
          appendToHistory(pendingAssistant);
        }
        pendingAssistant = null;
      }

      // --- UI helpers ---
      function hideWelcome() {
        if (welcomeEl) welcomeEl.style.display = 'none';
      }

      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || streaming) return;

        hideWelcome();
        appendUserMessage(text);
        appendToHistory({ role: 'user', text: text });
        input.value = '';
        input.style.height = 'auto';
        startStreaming(text);
      });

      newChatBtn.addEventListener('click', async () => {
        clearHistory();
        msgContainer.innerHTML = '';
        if (welcomeEl) {
          msgContainer.appendChild(welcomeEl);
          welcomeEl.style.display = '';
        }
        try { await fetch('/api/reset', { method: 'POST' }); } catch {}
      });

      function appendUserMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg user';
        el.innerHTML = `<div class="role">You</div><div class="content">${escapeHtml(text)}</div>`;
        msgContainer.appendChild(el);
        scrollToBottom();
      }

      function startAssistantMessage() {
        currentAssistantEl = document.createElement('div');
        currentAssistantEl.className = 'msg assistant';
        currentAssistantEl.innerHTML =
          '<div class="role"><span class="spinner"></span>Loopy</div>';
        currentContentEl = null;
        currentReasoningEl = null;
        currentToolEl = null;
        hasContent = false;
        resetPendingAssistant();
        msgContainer.appendChild(currentAssistantEl);
        scrollToBottom();
      }

      function ensureContentEl() {
        if (!currentContentEl) {
          currentContentEl = document.createElement('div');
          currentContentEl.className = 'content';
          currentAssistantEl.appendChild(currentContentEl);
        }
        return currentContentEl;
      }

      function ensureReasoningEl() {
        if (!currentReasoningEl) {
          currentReasoningEl = document.createElement('details');
          currentReasoningEl.className = 'reasoning-block';
          currentReasoningEl.open = true;
          currentReasoningEl.innerHTML =
            '<summary>Reasoning</summary><div class="content"></div>';
          currentAssistantEl.appendChild(currentReasoningEl);
        }
        return currentReasoningEl.querySelector('.content');
      }

      async function startStreaming(text) {
        streaming = true;
        sendBtn.disabled = true;
        startAssistantMessage();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: text,
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (!data) continue;
                try {
                  const event = JSON.parse(data);
                  handleEvent(event);
                } catch {}
              }
            }
          }
        } catch (err) {
          const el = document.createElement('div');
          el.className = 'error-block';
          el.textContent = 'Connection error: ' + err.message;
          if (currentAssistantEl) currentAssistantEl.appendChild(el);
          else msgContainer.appendChild(el);
          if (pendingAssistant) pendingAssistant.errors.push('Connection error: ' + err.message);
        }

        finishStreaming();
      }

      function handleEvent(event) {
        switch (event.type) {
          case 'Reasoning':
            ensureReasoningEl().textContent += event.data;
            if (pendingAssistant) pendingAssistant.reasoning += event.data;
            break;

          case 'Content':
            if (currentReasoningEl && currentReasoningEl.open) {
              currentReasoningEl.open = false;
            }
            ensureContentEl().textContent += event.data;
            hasContent = true;
            if (pendingAssistant) pendingAssistant.content += event.data;
            break;

          case 'ToolCallStart': {
            currentToolEl = document.createElement('div');
            currentToolEl.className = 'tool-block';
            currentToolEl.innerHTML = `<span class="tool-name">${escapeHtml(event.data.name)}</span>`;
            currentAssistantEl.appendChild(currentToolEl);
            break;
          }

          case 'ToolCallArgDelta':
            break;

          case 'ToolResult': {
            const el = document.createElement('div');
            el.className = 'tool-block';
            el.innerHTML = `<span class="tool-name">${escapeHtml(event.data.name)}</span><div class="tool-output">${escapeHtml(event.data.output)}</div>`;
            currentAssistantEl.appendChild(el);
            currentToolEl = null;
            if (pendingAssistant) pendingAssistant.tools.push({ name: event.data.name, output: event.data.output });
            break;
          }

          case 'SubmitUpdate': {
            const el = document.createElement('div');
            el.className = 'tool-block';
            el.innerHTML =
              '<span class="tool-name">submit_update</span><div class="tool-output">Submitting changes for compilation...</div>';
            currentAssistantEl.appendChild(el);
            if (pendingAssistant) pendingAssistant.tools.push({ name: 'submit_update', output: 'Submitting changes for compilation...' });
            break;
          }

          case 'Error': {
            const el = document.createElement('div');
            el.className = 'error-block';
            el.textContent = event.data;
            currentAssistantEl.appendChild(el);
            if (pendingAssistant) pendingAssistant.errors.push(event.data);
            break;
          }

          case 'Done':
            break;
        }
        scrollToBottom();
      }

      function finishStreaming() {
        streaming = false;
        sendBtn.disabled = false;
        if (currentAssistantEl) {
          const spinner = currentAssistantEl.querySelector('.spinner');
          if (spinner) spinner.remove();
        }
        savePendingAssistant();
        currentAssistantEl = null;
        currentContentEl = null;
        currentReasoningEl = null;
        currentToolEl = null;
        input.focus();
      }

      function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
      }

      // Restore conversation on load
      restoreMessages();
      input.focus();
    </script>
  </body>
</html>
